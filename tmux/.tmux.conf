# TODO: Get rid of these "magic strings" and tokenize some of this, making variables to make this easier
#       to understand and change, e.g., changing window separator decorations, etc.
set -gq status-right "#[fg=$color_cyan,bg=$color_bblack]Ņé▓#[fg=$color_black, bg=$color_cyan]${status_widgets} ’ü│ ${date_format} Ņé│ ’ĆŚ ${time_format} #[fg=$color_bcyan,bg=$color_cyan,nobold,nounderscore,noitalics]Ņé▓#[fg=$color_black,bg=$color_bcyan,bold] #h "
set -gq status-left "#[fg=$color_black,bg=$color_green,bold] ’åÆ #S #{prefix_highlight}"

# Current window_status_format
#   Ņé░(<window_start_flag>| )#I Ņé░ #W (#F| )Ņé░
#
# The problem with it is only the 1st window looks correctly. That's because the Ņé░ after #I should be specified FIRST
#
# So, the very first Ņé░ is one of:
#  -- if the first window, the closing session pane separator (bg=$color_green)
#  -- if not the last window, but is the active window, then it should be bg=$color_byellow
#  -- if not the last window, but is an inactive window, then it should be bg=$color_bblue
#  -- if the last window, and is active, should be bg=$color_yellow
#  -- if the last window, and is not active, should be bg=$color_blue

# if window_start_flag (is first window)
#  ->   DO: SOMETHING
#  -> ELSE: 

# DO I NEED TO USE A LOOP???

set -gq window-status-format "#{?window_start_flag,#[fg=$color_green#,bg=$color_bblue],#[fg=$color_blue#,bg=$color_bblue]}Ņé░#[fg=$color_black,bg=$color_bblue] #I #[fg=$color_bblue,bg=$color_blue]Ņé░ #[fg=$color_black,bg=$color_blue]#W #{?window_end_flag,#[fg=$color_blue#,bg=$color_black]Ņé░}"

#set -gq window-status-format "#[fg=#{?window_start_flag,$color_green,$color_bblue},bg=$color_bblue,nobold,nounderscore,noitalics]Ņé░#[fg=$color_black,bg=$color_bblue,nobold,nounderscore,noitalics]#{?window_start_flag, ,}#I #[fg=$color_bblue,bg=$color_blue,nobold,nounderscore,noitalics]Ņé░ #[fg=$color_black,bg=$color_blue,nobold,nounderscore,noitalics]#W #{?#F,#F ,}#[fg=$color_blue,bg=#{?window_end_flag,$color_bblack,$color_bblue},nobold,nounderscore,noitalics]#{?#{==:#I,#{e|-:#{active_window_index},1}},,Ņé░}"
set -gq window-status-current-format "#{?window_start_flag,#[fg=$color_green#,bg=$color_byellow#,nobold#,nounderscore#,noitalics],}Ņé░#[fg=$color_black,bold,bg=$color_byellow] #I #[fg=$color_byellow,bg=$color_yellow,nobold,nounderscore,noitalics]Ņé░#[fg=$color_black,bg=$color_yellow,nobold,nounderscore,noitalics] #W #[fg=$color_yellow,bg=#{?window_end_flag,$color_bblack,$color_bblue},nobold,nounderscore,noitalics]Ņé░"

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @tpm_plugins '           \
    tmux-plugins/tpm            \
    tmux-plugins/tmux-sensible  \
    tmux-plugins/tmux-resurrect \
    tmux-plugins/tmux-continuum \
'

# Install/configure tmux-resurrect to save/restore tmux sessions and vim windows
#set -g @plugin 'tmux-plugins/tmux-resurrect'

# Restore any vim sessions when a tmux session is restored
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'on'

setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
if "test ! -d $HOME/.tmux/plugins/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && $HOME/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
